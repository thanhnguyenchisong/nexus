quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${QUARKUS_DATASOURCE_JDBC_URL:jdbc:postgresql://localhost:5432/pulse}
quarkus.datasource.username=${QUARKUS_DATASOURCE_USERNAME:pulse}
quarkus.datasource.password=${QUARKUS_DATASOURCE_PASSWORD:pulse_dev}

quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true
quarkus.flyway.baseline-version=0

quarkus.http.cors=true
quarkus.http.cors.origins=*

# OpenAPI / Swagger
quarkus.swagger-ui.always-include=true

# AI Keys
openai.api.key=${OPENAI_API_KEY:""}
claude.api.key=${CLAUDE_API_KEY:""}

# AI Cost Management
ai.monthly.article.cap=${AI_MONTHLY_ARTICLE_CAP:500}
ai.primary.provider=${AI_PRIMARY_PROVIDER:OPENAI}

