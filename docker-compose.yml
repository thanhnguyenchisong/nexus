services:
  # ─── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: pulse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pulse
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pulse_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse -d pulse"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ─── Backend (Quarkus) ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./pulse-backend
      dockerfile: Dockerfile
    container_name: pulse-backend
    restart: unless-stopped
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://postgres:5432/pulse
      QUARKUS_DATASOURCE_USERNAME: pulse
      QUARKUS_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-pulse_dev}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      AI_MONTHLY_ARTICLE_CAP: ${AI_MONTHLY_ARTICLE_CAP:-500}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/q/health/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── Frontend (Nginx) ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./pulse-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8080}
    container_name: pulse-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
